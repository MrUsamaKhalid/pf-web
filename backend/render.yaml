# Render web service for the PropertyFinder photo downloader backend.
#
# Docker with a plain python:3.11-slim base. There is no browser on any code
# path — PropertyFinder server-renders __NEXT_DATA__, so a plain HTTP GET reads
# a listing in about a second.
services:
  - type: web
    name: pf-web-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    # Starter ($7/mo): the instance never spins down, so there is no ~60s cold
    # start. Free-tier keep-alive pings cannot deliver this reliably.
    plan: starter
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "10000"
