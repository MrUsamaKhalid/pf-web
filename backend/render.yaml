# Render web service for the PropertyFinder photo downloader backend.
#
# This uses the Docker option (Playwright's official Python image) because it
# bundles Chromium and every system library it needs - the most reliable way to
# run Playwright on Render. Render builds from the backend/ folder.
services:
  - type: web
    name: pf-web-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "10000"

