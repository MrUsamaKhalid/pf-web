<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PropertyFinder Photo Downloader</title>
  <style>
    :root {
      --bg: #e3e5cf;
      --card: #ffffff;
      --ink: #161618;
      --muted: #757a6c;
      --field: #f3f4ec;
      --line: #eeeeea;
      --lime: #cdeb5b;
      --lime-dark: #bcdc46;
      --err: #c0392b;
      --ok: #2f9e44;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--bg);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: var(--card);
      border-radius: 28px;
      padding: 30px 28px;
      box-shadow: 0 24px 55px -22px rgba(60, 65, 40, 0.32);
    }

    .badge {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--lime);
      box-shadow: 0 8px 18px -6px rgba(170, 200, 60, 0.6);
      margin-bottom: 20px;
    }
    .badge svg { width: 26px; height: 26px; }

    h1 {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: -0.4px;
      line-height: 1.2;
      margin: 0 0 10px;
    }

    .sub {
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.55;
      margin: 0 0 22px;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--field);
      border: 1px solid transparent;
      border-radius: 16px;
      padding: 6px 6px 6px 16px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .field:focus-within {
      border-color: #dfe3cf;
      box-shadow: 0 0 0 4px rgba(205, 235, 91, 0.4);
    }
    .field .lead {
      flex: none;
      display: flex;
      color: #9aa093;
    }
    .field .lead svg { width: 18px; height: 18px; }
    .field input {
      flex: 1;
      min-width: 0;
      border: none;
      outline: none;
      background: transparent;
      color: var(--ink);
      font-size: 0.97rem;
      padding: 12px 0;
    }
    .field input::placeholder { color: #a7ac9e; }

    .icon-btn {
      flex: none;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 12px;
      background: var(--lime);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.05s ease;
    }
    .icon-btn:hover { background: var(--lime-dark); }
    .icon-btn:active { transform: scale(0.94); }
    .icon-btn svg { width: 18px; height: 18px; }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin: 22px 0 26px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--ink);
      color: #fff;
      border-radius: 100px;
      padding: 9px 14px;
      font-size: 0.83rem;
      font-weight: 500;
    }
    .tag svg { width: 15px; height: 15px; flex: none; }

    .cta {
      width: 100%;
      padding: 17px;
      font-size: 1.02rem;
      font-weight: 600;
      color: #fff;
      background: var(--ink);
      border: none;
      border-radius: 100px;
      cursor: pointer;
      box-shadow: 0 12px 26px -12px rgba(0, 0, 0, 0.5);
      transition: background 0.15s ease, transform 0.05s ease;
    }
    .cta:hover:not(:disabled) { background: #000; }
    .cta:active:not(:disabled) { transform: translateY(1px); }
    .cta:disabled { opacity: 0.55; cursor: not-allowed; box-shadow: none; }

    .status {
      min-height: 20px;
      margin-top: 16px;
      font-size: 0.92rem;
      text-align: center;
      color: var(--muted);
    }
    .status.info { color: var(--ink); }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--err); }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      margin-right: 8px;
      border: 2px solid rgba(22, 22, 24, 0.25);
      border-top-color: var(--ink);
      border-radius: 50%;
      vertical-align: -2px;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .note {
      margin: 18px 0 0;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: #9aa093;
      font-size: 0.8rem;
      line-height: 1.5;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="#161618" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
        <polyline points="7 10 12 15 17 10" />
        <line x1="12" y1="15" x2="12" y2="3" />
      </svg>
    </div>

    <h1>Download listing photos</h1>

    <p class="sub">
      Paste a PropertyFinder link and get every photo in one clean ZIP, ready
      to edit in Photoshop.
    </p>

    <div class="field">
      <span class="lead" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.07 0l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
          <path d="M14 11a5 5 0 0 0-7.07 0l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
        </svg>
      </span>
      <input
        id="url"
        type="url"
        inputmode="url"
        autocomplete="off"
        aria-label="PropertyFinder listing URL"
        placeholder="https://www.propertyfinder.ae/en/plp/..."
      />
      <button id="paste" class="icon-btn" type="button" title="Paste from clipboard"
              aria-label="Paste from clipboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="#161618" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <rect x="8" y="2" width="8" height="4" rx="1" />
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
        </svg>
      </button>
    </div>

    <div class="tags">
      <span class="tag">
        <svg viewBox="0 0 24 24" fill="none" stroke="#cdeb5b" stroke-width="3"
             stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12" /></svg>
        No logos or agents
      </span>
      <span class="tag">
        <svg viewBox="0 0 24 24" fill="none" stroke="#cdeb5b" stroke-width="3"
             stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12" /></svg>
        Duplicates removed
      </span>
      <span class="tag">
        <svg viewBox="0 0 24 24" fill="none" stroke="#cdeb5b" stroke-width="3"
             stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12" /></svg>
        High-res ~1200px
      </span>
      <span class="tag">
        <svg viewBox="0 0 24 24" fill="none" stroke="#cdeb5b" stroke-width="3"
             stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12" /></svg>
        Auto-named ZIP
      </span>
    </div>

    <button id="go" class="cta">Download Photos</button>

    <div id="status" class="status"></div>

    <p class="note">
      The ZIP downloads straight to your browser. Extract it and edit in Photoshop.
    </p>
  </main>

  <script>
    // ===================================================================
    //  Live Render backend. For local testing use "http://127.0.0.1:5000".
    // ===================================================================
    const BACKEND_URL = "https://pf-web-d4in.onrender.com";

    const urlInput = document.getElementById("url");
    const goBtn = document.getElementById("go");
    const pasteBtn = document.getElementById("paste");
    const statusEl = document.getElementById("status");

    function setStatus(message, type, spinner) {
      statusEl.className = "status " + (type || "");
      statusEl.innerHTML =
        (spinner ? '<span class="spinner"></span>' : "") + message;
    }

    function filenameFromHeader(header) {
      if (!header) return null;
      let m = header.match(/filename\*=(?:UTF-8'')?([^;]+)/i);
      if (m && m[1]) return decodeURIComponent(m[1].replace(/["']/g, "").trim());
      m = header.match(/filename="?([^"]+)"?/i);
      if (m && m[1]) return m[1].trim();
      return null;
    }

    async function pasteFromClipboard() {
      try {
        const text = await navigator.clipboard.readText();
        if (text) urlInput.value = text.trim();
      } catch (e) {
        // Clipboard blocked (permissions / insecure context) - paste manually.
      }
      urlInput.focus();
    }

    async function downloadPhotos() {
      const url = urlInput.value.trim();

      if (!url) {
        setStatus("Please paste a PropertyFinder link.", "err");
        return;
      }
      if (!BACKEND_URL || BACKEND_URL.indexOf("PASTE_") !== -1) {
        setStatus("Backend URL is not set yet.", "err");
        return;
      }

      goBtn.disabled = true;
      setStatus("Working...", "info", true);

      let res;
      try {
        res = await fetch(BACKEND_URL + "/scrape", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url: url }),
        });
      } catch (e) {
        setStatus("Render backend is waking up. Try again in a moment.", "err");
        goBtn.disabled = false;
        return;
      }

      if (!res.ok) {
        let message = "Something went wrong. Please try again.";
        try {
          const data = await res.json();
          if (data && data.error) message = data.error;
        } catch (e) {
          if (res.status === 502 || res.status === 503) {
            message = "Render backend is waking up. Try again in a moment.";
          }
        }
        setStatus(message, "err");
        goBtn.disabled = false;
        return;
      }

      try {
        const blob = await res.blob();
        const count = res.headers.get("X-Photo-Count") || "";
        const filename =
          filenameFromHeader(res.headers.get("Content-Disposition")) ||
          "propertyfinder-photos.zip";

        const objectUrl = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = objectUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(objectUrl);

        setStatus("Done - " + (count || "?") + " photos", "ok");
      } catch (e) {
        setStatus("Could not save the ZIP. Please try again.", "err");
      } finally {
        goBtn.disabled = false;
      }
    }

    goBtn.addEventListener("click", downloadPhotos);
    pasteBtn.addEventListener("click", pasteFromClipboard);
    urlInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") downloadPhotos();
    });
  </script>
</body>
</html>
