<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listing Photo Downloader · PropertyFinder × Sykon</title>
  <meta name="description" content="Download every PropertyFinder listing photo — property and community, full resolution, in tidy folders." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://pf-web-d4in.onrender.com" />
  <link
    rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap"
    onload="this.onload=null;this.rel='stylesheet'"
  />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" />
  </noscript>

  <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>

  <style>
    /* ============================ tokens ============================ */
    :root {
      --bg: #ecedf0;
      --card: #fefefe;
      --ink: #111111;
      --soft: #3f4651;
      --muted: #6b7280;
      --faint: #9aa0a6;
      --field: #f3f4f6;
      --line: #ededf0;
      --pf: #ef5e4e;
      --pf-dark: #e0492f;
      --pf-soft: rgba(239, 94, 78, 0.12);
      --ok: #1f9d57;
      --warn: #e0a32c;
      --err: #c0392b;

      --s1: 4px;  --s2: 8px;  --s3: 12px; --s4: 16px;
      --s5: 20px; --s6: 24px; --s7: 32px; --s8: 40px;

      --r-field: 16px;
      --r-card: 28px;
      --r-pill: 999px;
      --stroke: 1px;
      --w-card: 520px;
      /* one formation: every primary control is the same height + radius */
      --h-control: 56px;
      --r-control: 16px;

      --t-xs: 12px; --t-sm: 13px; --t-md: 15px; --t-lg: 17px; --t-xl: 25px;

      --ease: cubic-bezier(.2, .7, .2, 1);
      --ease-in: cubic-bezier(.16, 1, .3, 1);
      --ease-spring: cubic-bezier(.34, 1.56, .64, 1);
      --d-fast: 140ms; --d: 220ms; --d-slow: 340ms; --d-rev: 560ms;

      --font-display: "Space Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-body: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }
    [hidden] { display: none !important; }

    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: var(--t-md);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--s6) var(--s4);
      overflow-x: hidden;
    }
    /* auto margins centre without clipping when content outgrows the viewport */
    .shell { margin: auto; width: 100%; max-width: var(--w-card); }

    body.custom-cursor, body.custom-cursor * { cursor: none; }
    body.custom-cursor input, body.custom-cursor textarea { cursor: text; }

    /* ============================ background ============================ */
    .bg { position: fixed; inset: 0; overflow: hidden; z-index: 0; pointer-events: none; }
    .aurora {
      position: absolute; top: -30%; left: -30%; width: 160%; height: 160%;
      background:
        radial-gradient(38% 42% at 28% 32%, rgba(239,94,78,0.18), rgba(239,94,78,0) 70%),
        radial-gradient(46% 40% at 74% 26%, rgba(70,84,120,0.14), rgba(70,84,120,0) 72%),
        radial-gradient(50% 50% at 60% 80%, rgba(255,244,240,0.5), rgba(255,244,240,0) 70%);
      opacity: .85; will-change: opacity; animation: auroraPulse 26s ease-in-out infinite;
    }
    @keyframes auroraPulse { 0%,100% { opacity: .7; } 50% { opacity: 1; } }
    .grid {
      position: absolute; inset: -2%;
      background-image: radial-gradient(rgba(70,84,120,.5) 1px, transparent 1.5px);
      background-size: 26px 26px;
      -webkit-mask-image: radial-gradient(62% 58% at 50% 45%, #000 0%, transparent 78%);
              mask-image: radial-gradient(62% 58% at 50% 45%, #000 0%, transparent 78%);
      opacity: .05; animation: gridFade 18s ease-in-out infinite;
    }
    @keyframes gridFade { 0%,100% { opacity: .03; } 50% { opacity: .07; } }
    .blob { position: absolute; }
    .blob .inner { width: 100%; height: 100%; }
    .blob-1 { top: 50%; left: 50%; width: 540px; height: 540px; margin: -270px 0 0 -270px; opacity: .18; filter: blur(46px); }
    .blob-1 .inner { animation: float1 11s ease-in-out infinite; }
    .blob-1 svg { width: 100%; height: 100%; display: block; }
    .blob-2 { top: 12%; left: 64%; width: 460px; height: 460px; filter: blur(54px); }
    .blob-2 .inner { border-radius: 50%; background: radial-gradient(circle at 50% 50%, rgba(239,94,78,.55), rgba(239,94,78,0) 66%); animation: float2 13s ease-in-out infinite, breatheA 15s ease-in-out infinite; }
    .blob-3 { bottom: 4%; left: 8%; width: 420px; height: 420px; filter: blur(60px); }
    .blob-3 .inner { border-radius: 50%; background: radial-gradient(circle at 50% 50%, rgba(70,84,120,.34), rgba(70,84,120,0) 66%); animation: float1 16s ease-in-out infinite, breatheB 19s ease-in-out infinite 3s; }
    @keyframes float1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(0,-26px); } }
    @keyframes float2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(16px,20px); } }
    @keyframes breatheA { 0%,100% { opacity: .32; } 50% { opacity: .6; } }
    @keyframes breatheB { 0%,100% { opacity: .3; } 50% { opacity: .55; } }

    /* ============================ cursor ============================ */
    .cursor-dot, .cursor-ring {
      position: fixed; top: 0; left: 0; border-radius: 50%; pointer-events: none;
      z-index: 9999; transform: translate(-50%,-50%); will-change: transform; display: none;
    }
    body.custom-cursor .cursor-dot, body.custom-cursor .cursor-ring { display: block; }
    .cursor-dot { width: 6px; height: 6px; background: var(--pf); }
    .cursor-ring {
      width: 34px; height: 34px; border: 1.5px solid rgba(239,94,78,.55);
      transition: width var(--d) var(--ease-spring), height var(--d) var(--ease-spring),
                  background var(--d) var(--ease), border-color var(--d) var(--ease);
    }
    .cursor-ring.hot { width: 58px; height: 58px; background: rgba(239,94,78,.08); border-color: var(--pf); }

    /* ============================ card ============================ */
    .stage { position: relative; z-index: 1; perspective: 1200px; }
    .card {
      position: relative;
      background: var(--card);
      border: var(--stroke) solid var(--line);
      border-radius: var(--r-card);
      padding: var(--s6);
      box-shadow: 0 34px 70px -30px rgba(28,32,44,.42), 0 6px 16px -10px rgba(28,32,44,.18);
      transform-style: preserve-3d;
      transition: transform var(--d-slow) var(--ease);
      animation: rise var(--d-rev) var(--ease-in) both;
    }
    @keyframes rise { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }
    .sheen {
      position: absolute; inset: 0; border-radius: inherit; pointer-events: none; opacity: 0;
      transition: opacity var(--d) var(--ease);
      background: radial-gradient(360px circle at var(--sx,50%) var(--sy,50%), rgba(255,255,255,.55), transparent 60%);
      mix-blend-mode: soft-light;
    }
    .card.lift .sheen { opacity: 1; }

    .cobrand {
      display: flex; align-items: center; justify-content: center; gap: var(--s3);
      padding-bottom: var(--s5); margin-bottom: var(--s5);
      border-bottom: var(--stroke) solid var(--line);
    }
    .cobrand svg.pf-logo { height: 26px; width: auto; display: block; }
    .cobrand svg.sykon-logo { height: 15px; width: auto; display: block; }
    .cobrand .x { color: #cdcfd4; font-size: var(--t-md); }

    h1 {
      font-family: var(--font-display); font-size: var(--t-xl); font-weight: 700;
      letter-spacing: -.03em; line-height: 1.12; margin: 0 0 var(--s2);
    }
    .sub { color: var(--muted); font-size: var(--t-md); line-height: 1.55; margin: 0 0 var(--s5); }

    /* ============================ segmented control ============================ */
    .seg {
      display: grid; grid-template-columns: 1fr 1fr; gap: var(--s1);
      height: var(--h-control);
      background: var(--field); border-radius: var(--r-control); padding: var(--s1);
      margin-bottom: var(--s3);
    }
    .seg-btn {
      appearance: none; border: 0; background: transparent; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; gap: var(--s2);
      height: 100%; padding: 0 var(--s3);
      font-family: var(--font-body); font-size: var(--t-sm); font-weight: 600; color: var(--muted);
      border-radius: calc(var(--r-control) - var(--s1));
      transition: background var(--d) var(--ease), color var(--d) var(--ease), box-shadow var(--d) var(--ease);
    }
    .seg-btn:hover { color: var(--ink); }
    /* selected = lifted white chip with a coral marker (black stays reserved for the CTA) */
    .seg-btn[aria-selected="true"] {
      background: #fff; color: var(--ink);
      box-shadow: 0 1px 2px rgba(17,17,17,.05), 0 6px 14px -8px rgba(17,17,17,.22);
    }
    .seg-btn[aria-selected="true"]::before {
      content: ""; flex: none; width: 6px; height: 6px; border-radius: 50%; background: var(--pf);
    }

    /* ============================ fields ============================ */
    .field {
      display: flex; align-items: center; gap: var(--s2);
      height: var(--h-control);
      background: var(--field);
      border: 1.5px solid transparent; border-radius: var(--r-control);
      padding: 0 6px 0 var(--s4);
      transition: border-color var(--d) var(--ease), box-shadow var(--d) var(--ease), background var(--d) var(--ease);
    }
    .field:focus-within { background: #fff; border-color: var(--pf); box-shadow: 0 0 0 3px var(--pf-soft); }
    .field .lead { flex: none; display: flex; color: #aab0bb; transition: color var(--d) var(--ease); }
    .field:focus-within .lead { color: var(--pf); }
    .field .lead svg { width: 18px; height: 18px; }
    .field input {
      flex: 1; min-width: 0; height: 100%; border: 0; outline: 0; background: transparent;
      font-family: var(--font-body); font-size: var(--t-md); color: var(--ink);
      padding: 0;
    }
    .field input::placeholder { color: #aeb4bd; }

    .ghost-btn {
      flex: none; display: inline-flex; align-items: center; gap: 6px;
      border: 0; background: transparent; color: var(--muted); cursor: pointer;
      font-family: var(--font-body); font-size: var(--t-sm); font-weight: 500;
      height: 44px; padding: 0 var(--s3); border-radius: 12px;
      transition: background var(--d-fast) var(--ease), color var(--d-fast) var(--ease), transform var(--d-fast) var(--ease-spring);
    }
    .ghost-btn:hover { background: var(--pf-soft); color: var(--pf-dark); transform: translateY(-1px); }
    .ghost-btn:active { transform: translateY(0) scale(.97); }
    .ghost-btn svg { width: 16px; height: 16px; }

    .area {
      width: 100%; min-height: 128px; resize: vertical; display: block;
      background: var(--field); border: 1.5px solid transparent; border-radius: var(--r-control);
      padding: var(--s3) var(--s4);
      font-family: var(--font-body); font-size: var(--t-sm); line-height: 1.6; color: var(--ink);
      outline: 0;
      transition: border-color var(--d) var(--ease), box-shadow var(--d) var(--ease), background var(--d) var(--ease);
    }
    .area:focus { background: #fff; border-color: var(--pf); box-shadow: 0 0 0 3px var(--pf-soft); }
    .area::placeholder { color: #aeb4bd; }
    .counter { margin: var(--s2) 0 0; font-size: var(--t-xs); color: var(--muted); min-height: 16px; }

    /* ============================ CTA ============================ */
    .cta {
      position: relative; overflow: hidden; width: 100%;
      display: flex; align-items: center; justify-content: center; gap: var(--s2);
      height: var(--h-control); padding: 0 var(--s5);
      font-family: var(--font-display); font-size: var(--t-lg); font-weight: 600; letter-spacing: .01em;
      color: #fff; background: var(--ink); border: 0; border-radius: var(--r-control); cursor: pointer;
      box-shadow: 0 16px 32px -16px rgba(17,17,17,.55);
      transition: box-shadow var(--d) var(--ease), opacity var(--d) var(--ease);
      margin-top: var(--s3);
    }
    .cta:hover { box-shadow: 0 22px 44px -16px rgba(214,54,31,.5); }
    .cta .fill {
      position: absolute; inset: 0; border-radius: inherit; z-index: 0;
      background: linear-gradient(120deg, #ff8568 0%, #ef5e4e 50%, #d6361f 100%);
      clip-path: circle(0% at var(--cx,50%) var(--cy,50%));
      transition: clip-path var(--d-rev) cubic-bezier(.22,.61,.36,1);
    }
    .cta:hover .fill { clip-path: circle(150% at var(--cx,50%) var(--cy,50%)); }
    .cta:disabled .fill { clip-path: circle(0% at 50% 50%); }
    .cta .shine {
      position: absolute; inset: 0; border-radius: inherit; z-index: 1; pointer-events: none; opacity: 0;
      background: linear-gradient(115deg, transparent 30%, rgba(255,255,255,.35) 48%, transparent 66%);
      background-size: 250% 100%; background-position: 120% 0;
      transition: opacity var(--d) var(--ease);
    }
    .cta:hover .shine { opacity: 1; animation: shine 1.1s cubic-bezier(.4,0,.2,1) .12s; }
    @keyframes shine { from { background-position: 120% 0; } to { background-position: -40% 0; } }
    .cta .label, .cta .ico { position: relative; z-index: 2; display: inline-flex; }
    .cta .ico { transition: transform var(--d) var(--ease-spring); }
    .cta:hover .ico { transform: translateY(3px); }
    .cta .ico svg { width: 18px; height: 18px; }
    .cta:disabled { opacity: .55; cursor: not-allowed; box-shadow: none; }

    /* ============================ results ============================ */
    .results {
      margin-top: var(--s5);
      background: #f6f6f8; border: var(--stroke) solid var(--line); border-radius: var(--r-field);
      padding: var(--s3) var(--s4); max-height: 260px; overflow-y: auto;
    }
    .log { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: var(--s2); }
    .log-line {
      display: flex; align-items: flex-start; gap: var(--s2);
      font-size: var(--t-sm); line-height: 1.4; color: var(--muted);
      animation: logIn var(--d) var(--ease-in);
    }
    @keyframes logIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .log-line.on { color: var(--ink); font-weight: 500; }
    .log-line.bad { color: var(--err); }
    .log-line.note { color: #8a7d55; }
    .log-line .ico { flex: none; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; margin-top: 1px; }
    .log-line .ico svg { width: 15px; height: 15px; }

    .rows { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: var(--s2); }
    .row {
      border: var(--stroke) solid var(--line); border-radius: 14px; padding: var(--s3);
      background: #fff;
      transition: border-color var(--d) var(--ease);
    }
    .row.ok { border-color: rgba(31,157,87,.45); }
    .row.bad { border-color: rgba(192,57,43,.45); }
    .row-title { font-weight: 600; font-size: var(--t-sm); margin: 0 0 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .row-meta { color: var(--muted); font-size: var(--t-xs); margin: 0; }
    .row-actions { display: flex; gap: var(--s2); margin-top: var(--s2); }
    .chip-btn {
      border: 0; background: var(--pf-soft); color: var(--pf-dark); cursor: pointer;
      font-family: var(--font-body); font-size: var(--t-xs); font-weight: 600;
      padding: 6px 11px; border-radius: 9px; text-decoration: none; display: inline-block;
      transition: background var(--d-fast) var(--ease);
    }
    .chip-btn:hover { background: rgba(239,94,78,.2); }

    .bar { margin-top: var(--s3); height: 6px; background: #e6e6ea; border-radius: var(--r-pill); overflow: hidden; }
    .bar span { display: block; height: 100%; width: 0%; background: linear-gradient(90deg, #ff8568, #ef5e4e); border-radius: var(--r-pill); transition: width var(--d-slow) var(--ease); }

    .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(239,94,78,.3); border-top-color: var(--pf); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status { min-height: 20px; margin-top: var(--s3); font-size: var(--t-sm); text-align: center; color: var(--muted); }
    .status.ok { color: var(--ok); font-weight: 600; }
    .status.bad { color: var(--err); font-weight: 500; }

    .zip-all { width: 100%; height: var(--h-control); margin-top: var(--s3); padding: 0 var(--s5); font-family: var(--font-display); font-weight: 600; font-size: var(--t-md); color: var(--ink); background: #fff; border: 1.5px solid var(--line); border-radius: var(--r-control); cursor: pointer; transition: border-color var(--d) var(--ease), background var(--d) var(--ease), transform var(--d-fast) var(--ease-spring); }
    .zip-all:hover { border-color: var(--pf); background: var(--pf-soft); color: var(--pf-dark); transform: translateY(-2px); }
    .zip-all:hover { background: #000; transform: translateY(-2px); }
    .zip-all:active { transform: translateY(0) scale(.98); }

    /* ============================ server chip + signature ============================ */
    .server {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      margin-top: var(--s4); padding-top: var(--s4);
      border-top: var(--stroke) solid var(--line);
      font-size: var(--t-xs); color: var(--faint);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #c7c9cc; flex: none; transition: background var(--d) var(--ease); }
    .server.on { color: var(--soft); }
    .server.on .dot { background: var(--ok); box-shadow: 0 0 0 3px rgba(31,157,87,.16); }
    .server.waking .dot { background: var(--warn); box-shadow: 0 0 0 3px rgba(224,163,44,.16); animation: pulse 1.2s ease-in-out infinite; }
    .server.off .dot { background: var(--err); }
    .server.check .dot { animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

    .signature { margin: var(--s5) 0 0; text-align: center; font-size: var(--t-xs); color: #aab0b8; }
    .signature a { color: #8b929c; text-decoration: none; font-weight: 600; border-bottom: 1.5px dotted #c9ced6; }
    .signature a:hover { color: var(--pf-dark); border-bottom-color: var(--pf); }

    /* ============================ responsive ============================ */
    @media (max-width: 420px) {
      body { padding: var(--s4) var(--s3); }
      .card { padding: var(--s5) var(--s4); border-radius: 24px; }
      :root { --t-xl: 22px; }
      .results { max-height: 220px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
      .aurora, .grid, .blob { display: none; }
    }

    /* ?debug=layout */
    body.debug-layout * { outline: 1px solid rgba(239,94,78,.35); }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="aurora"></div>
    <div class="grid"></div>
    <div class="blob blob-1" data-depth="-46">
      <div class="inner">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 288 438"><path fill="#ef5e4e" d="M144.3.7C223.6.7 288 65.5 288 145.5c0 12.5-1.6 24.6-4.5 36.2-3.3 12.8-8.3 25-14.7 36.2-6.3 11-14 21.1-22.9 30-26 26.2-61.9 42.4-101.5 42.4v-1.9c-1.4-41.3-19.1-78.4-46.7-105-25.4-24.5-59.4-40.1-96.8-41.9 1-38.4 16.9-73 42-98.4C68.7 16.9 104.6.7 144.3.7zM.7 435.1c79.3 0 143.7-64.8 143.7-144.8H.7v144.8z"/></svg>
      </div>
    </div>
    <div class="blob blob-2" data-depth="38"><div class="inner"></div></div>
    <div class="blob blob-3" data-depth="28"><div class="inner"></div></div>
  </div>

  <div class="cursor-dot" aria-hidden="true"></div>
  <div class="cursor-ring" aria-hidden="true"></div>

  <div class="shell">
    <div class="stage">
      <main class="card" id="card">

  <script>
    "use strict";
    /* =================================================================
       Listing Photo Downloader — v2 (no auth, no history)
       ================================================================= */
    const BACKEND_URL = "https://pf-web-d4in.onrender.com";

    // v1 left a remembered agent name behind; retire it for good.
    try { localStorage.removeItem("pf_agent"); } catch (e) {}
    if (location.search.indexOf("debug=layout") !== -1) document.body.classList.add("debug-layout");

    const $ = (id) => document.getElementById(id);
    const urlInput = $("url"), urlsInput = $("urls"), counter = $("counter");
    const goBtn = $("go"), goLabel = $("goLabel"), pasteBtn = $("paste");
    const resultsEl = $("results"), logEl = $("log"), rowsEl = $("rows");
    const barWrap = $("bar"), barFill = $("barFill");
    const statusEl = $("status"), zipAllBtn = $("zipAll");
    const segSingle = $("segSingle"), segBatch = $("segBatch");
    const paneSingle = $("paneSingle"), paneBatch = $("paneBatch");

    const CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="#ef5e4e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
    const CROSS = '<svg viewBox="0 0 24 24" fill="none" stroke="#c0392b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
    const SPIN = '<span class="spinner"></span>';
    const INFO = '<svg viewBox="0 0 24 24" fill="none" stroke="#8a7d55" stroke-width="2.4" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="11" x2="12" y2="16.5"/><line x1="12" y1="7.5" x2="12" y2="7.6"/></svg>';

    let mode = "single";
    let busy = false;
    let activeLine = null;

    /* ------------------------------ helpers ------------------------------ */
    function setStatus(msg, kind) { statusEl.className = "status " + (kind || ""); statusEl.textContent = msg; }

    function b64ToBytes(b64) {
      const bin = atob(b64);
      const out = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
      return out;
    }
    function saveBytes(bytes, name) {
      const blob = bytes instanceof Blob ? bytes : new Blob([bytes], { type: "application/zip" });
      const u = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = u; a.download = name;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(u), 40000);
    }
    // v3 hands back a download token instead of the bytes: the browser fetches
    // the ZIP straight from the backend, so nothing large ever lives in JS.
    function saveFromUrl(path) {
      const a = document.createElement("a");
      a.href = BACKEND_URL + path;
      a.rel = "noopener";
      document.body.appendChild(a); a.click(); a.remove();
    }
    // Options UI lands in the next pass; until then the backend defaults apply.
    function currentOptions() {
      try { return JSON.parse(localStorage.getItem("pf_options") || "{}") || {}; }
      catch (e) { return {}; }
    }
    function cleanStem(s) {
      return (s || "").trim().replace(/[\\/:*?"<>|]+/g, "-").replace(/\s+/g, " ")
        .replace(/^[.\s]+|[.\s]+$/g, "").slice(0, 80);
    }
    function isPfUrl(u) {
      try { return new URL(u).hostname.toLowerCase().indexOf("propertyfinder.") !== -1; }
      catch (e) { return false; }
    }
    function canonical(u) {
      try { const x = new URL(u); return x.protocol + "//" + x.hostname.toLowerCase() + x.pathname.replace(/\/+$/, ""); }
      catch (e) { return (u || "").toLowerCase(); }
    }

    /* ------------------------------ log UI ------------------------------ */
    function resetResults(kind) {
      logEl.innerHTML = ""; rowsEl.innerHTML = "";
      activeLine = null;
      logEl.hidden = kind !== "log";
      rowsEl.hidden = kind !== "rows";
      barWrap.hidden = true; barFill.style.width = "0%";
      resultsEl.hidden = false;
      zipAllBtn.hidden = true;
    }
    function finishLine() {
      if (activeLine) { activeLine.classList.remove("on"); activeLine.querySelector(".ico").innerHTML = CHECK; }
    }
    function step(text) {
      finishLine();
      const li = document.createElement("li");
      li.className = "log-line on";
      li.innerHTML = '<span class="ico">' + SPIN + '</span><span class="txt"></span>';
      li.querySelector(".txt").textContent = text;
      logEl.appendChild(li);
      activeLine = li;
      resultsEl.scrollTop = resultsEl.scrollHeight;
    }
    function stepProgress(done, total) {
      barWrap.hidden = false;
      barFill.style.width = (total ? Math.round((done / total) * 100) : 0) + "%";
      if (!activeLine || !activeLine.classList.contains("dl")) {
        step("Downloading photos " + done + "/" + total);
        activeLine.classList.add("dl");
      } else {
        activeLine.querySelector(".txt").textContent = "Downloading photos " + done + "/" + total;
      }
    }
    function failLine() {
      if (activeLine) {
        activeLine.classList.remove("on"); activeLine.classList.add("bad");
        activeLine.querySelector(".ico").innerHTML = CROSS; activeLine = null;
      }
    }
    function errLine(msg) {
      const li = document.createElement("li");
      li.className = "log-line bad";
      li.innerHTML = '<span class="ico">' + CROSS + '</span><span class="txt"></span>';
      li.querySelector(".txt").textContent = msg;
      logEl.appendChild(li);
      resultsEl.scrollTop = resultsEl.scrollHeight;
    }
    function fail(msg) { failLine(); errLine(msg); setStatus(msg, "bad"); }
    function noteLine(msg) {
      const li = document.createElement("li");
      li.className = "log-line note";
      li.innerHTML = '<span class="ico">' + INFO + '</span><span class="txt"></span>';
      li.querySelector(".txt").textContent = msg;
      logEl.appendChild(li);
      resultsEl.scrollTop = resultsEl.scrollHeight;
    }
    function okLine(msg) {
      const li = document.createElement("li");
      li.className = "log-line";
      li.innerHTML = '<span class="ico">' + CHECK + '</span><span class="txt"></span>';
      li.querySelector(".txt").textContent = msg;
      logEl.appendChild(li);
      resultsEl.scrollTop = resultsEl.scrollHeight;
    }

    /* ------------------------- shared scrape engine ------------------------- */
    async function streamScrape(url, cb, signal, options) {
      let res;
      try {
        res = await fetch(BACKEND_URL + "/scrape", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url, options: options || currentOptions() }),
          signal,
        });
      } catch (e) {
        cb.error(signal && signal.aborted ? "Timed out." : "Server is waking up. Try again in a moment.");
        return;
      }
      if (!res.ok) {
        let message = "Something went wrong. Please try again.";
        try { const d = await res.json(); if (d && d.error) message = d.error; }
        catch (e) { if (res.status === 502 || res.status === 503) message = "Server is waking up. Try again in a moment."; }
        cb.error(message); return;
      }
      if (!res.body) { cb.error("This browser can't stream the response. Please update it."); return; }

      let finished = false;
      const handle = (m) => {
        if (m.type === "log") { cb.log && cb.log(m.message); }
        else if (m.type === "notice") { (cb.notice || cb.log) && (cb.notice || cb.log)(m.message); }
        else if (m.type === "meta") { cb.meta && cb.meta(m); }
        else if (m.type === "progress") { cb.progress && cb.progress(m.done, m.total); }
        else if (m.type === "error") { finished = true; cb.error(m.message, m.code); }
        else if (m.type === "done") { finished = true; cb.done(m); }
      };
      try {
        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = "";
        for (;;) {
          const chunk = await reader.read();
          if (chunk.done) break;
          buf += dec.decode(chunk.value, { stream: true });
          let i;
          while ((i = buf.indexOf("\n")) >= 0) {
            const line = buf.slice(0, i).trim();
            buf = buf.slice(i + 1);
            if (line) { let m = null; try { m = JSON.parse(line); } catch (e) {} if (m) handle(m); }
          }
          if (finished) { try { await reader.cancel(); } catch (e) {} break; }
        }
        const tail = (buf + dec.decode()).trim();
        if (!finished && tail) { let m = null; try { m = JSON.parse(tail); } catch (e) {} if (m) handle(m); }
        if (!finished) cb.error("Connection ended early. Please try again.");
      } catch (e) {
        cb.error(signal && signal.aborted ? "Timed out." : "Connection lost. Please try again.");
      }
    }

    /* ------------------------------ single ------------------------------ */
    async function runSingle() {
      const url = urlInput.value.trim();
      if (!url) { setStatus("Paste a PropertyFinder link first.", "bad"); urlInput.focus(); return; }
      if (!isPfUrl(url)) { setStatus("That doesn't look like a PropertyFinder link.", "bad"); return; }

      busy = true; goBtn.disabled = true; setStatus("", "");
      resetResults("log");
      step("Contacting server");
      const wake = setTimeout(() => {
        if (activeLine && activeLine.querySelector(".txt").textContent === "Contacting server")
          activeLine.querySelector(".txt").textContent = "Waking the server (first run can take a minute)…";
      }, 6000);

      try {
        await streamScrape(url, {
          log: (m) => { clearTimeout(wake); step(m); },
          notice: (m) => { clearTimeout(wake); finishLine(); noteLine(m); activeLine = null; },
          progress: (d, t) => { clearTimeout(wake); stepProgress(d, t); },
          error: (m) => { clearTimeout(wake); fail(m); },
          done: (msg) => {
            clearTimeout(wake); finishLine();
            barWrap.hidden = false; barFill.style.width = "100%";
            const name = msg.filename || "propertyfinder-photos.zip";
            try {
              // v3 sends a token; older backends still send base64. Pages and
              // Render deploy independently, so both paths must work.
              if (msg.download) saveFromUrl(msg.download);
              else if (msg.zip) saveBytes(b64ToBytes(msg.zip), name);
              else throw new Error("no payload");
            } catch (e) { fail("Could not save the ZIP. Please try again."); return; }

            const summary = (typeof msg.property === "number" && typeof msg.community === "number")
              ? msg.property + " property + " + msg.community + " community (" + msg.count + " photos)"
              : msg.count + " photos";
            okLine("Saved " + name);
            if (msg.failed) noteLine(msg.failed + " photo(s) could not be downloaded");
            setStatus((msg.truncated ? "Partly done — " : "Done — ") + summary,
                      msg.truncated ? "" : "ok");
          },
        });
      } finally {
        clearTimeout(wake); busy = false; goBtn.disabled = false;
      }
    }

    /* ------------------------------ batch ------------------------------ */
    function parseLinks() {
      const raw = urlsInput.value.split(/\r?\n/).map((s) => s.trim()).filter(Boolean);
      const seen = new Set(); const list = []; let dupes = 0, bad = 0;
      raw.forEach((u) => {
        if (!isPfUrl(u)) { bad++; return; }
        const k = canonical(u);
        if (seen.has(k)) { dupes++; return; }
        seen.add(k); list.push(u);
      });
      return { list, dupes, bad };
    }
    function updateCounter() {
      const { list, dupes, bad } = parseLinks();
      if (!urlsInput.value.trim()) { counter.textContent = ""; return; }
      const bits = [list.length + (list.length === 1 ? " link" : " links")];
      if (dupes) bits.push(dupes + " duplicate" + (dupes === 1 ? "" : "s") + " removed");
      if (bad) bits.push(bad + " not a PropertyFinder link");
      counter.textContent = bits.join(" · ");
    }

    async function runBatch() {
      const { list } = parseLinks();
      if (!list.length) { setStatus("Paste at least one PropertyFinder link.", "bad"); urlsInput.focus(); return; }

      busy = true; goBtn.disabled = true; setStatus("", "");
      resetResults("rows");
      const collected = [];
      let ok = 0, failed = 0;

      try {
        for (let i = 0; i < list.length; i++) {
          const url = list[i];
          const li = document.createElement("li"); li.className = "row";
          const t = document.createElement("p"); t.className = "row-title"; t.textContent = url;
          const m = document.createElement("p"); m.className = "row-meta"; m.textContent = "Queued…";
          const acts = document.createElement("div"); acts.className = "row-actions";
          li.append(t, m, acts); rowsEl.appendChild(li);
          setStatus("Processing " + (i + 1) + " of " + list.length + "…", "");

          const ctrl = new AbortController();
          const timer = setTimeout(() => ctrl.abort(), 165000);
          const result = await new Promise((resolve) => {
            let settled = false;
            streamScrape(url, {
              log: (msg) => { m.textContent = msg; if (msg.indexOf("Listing: ") === 0) t.textContent = msg.slice(9); },
              progress: (d, total) => { m.textContent = "Downloading " + d + "/" + total; },
              error: (msg) => { if (!settled) { settled = true; resolve({ error: msg }); } },
              done: (msg) => { if (!settled) { settled = true; resolve({ done: msg }); } },
            }, ctrl.signal);
          });
          clearTimeout(timer);

          if (result.done && (result.done.count || 0) > 0) {
            const msg = result.done;
            const stem = cleanStem(msg.title) || (msg.filename ? msg.filename.replace(/\.zip$/, "") : "propertyfinder-photos");
            const name = stem + ".zip";
            let entry = null;
            if (msg.download) entry = { name, path: msg.download, bytes: null, size: msg.bytes || 0 };
            else if (msg.zip) { try { entry = { name, path: null, bytes: b64ToBytes(msg.zip), size: msg.bytes || 0 }; } catch (e) {} }
            if (entry) {
              collected.push(entry);
              const dl = document.createElement("button");
              dl.className = "chip-btn"; dl.type = "button"; dl.textContent = "Download";
              dl.addEventListener("click", () => entry.path ? saveFromUrl(entry.path) : saveBytes(entry.bytes, entry.name));
              acts.appendChild(dl);
            }
            const open = document.createElement("a");
            open.className = "chip-btn"; open.href = url; open.target = "_blank"; open.rel = "noopener";
            open.textContent = "Open listing";
            acts.appendChild(open);
            t.textContent = msg.title || url;
            m.textContent = (msg.property || 0) + " property · " + (msg.community || 0) + " community · " + (msg.count || 0) + " photos";
            li.classList.add("ok"); ok++;
          } else if (result.done) {
            m.textContent = "No photos found on this listing"; li.classList.add("bad"); failed++;
          } else {
            m.textContent = result.error || "Failed"; li.classList.add("bad"); failed++;
          }
          rowsEl.scrollTop = rowsEl.scrollHeight;
        }
      } finally {
        busy = false; goBtn.disabled = false;
      }

      const hosted = collected.some((c) => c.path);
      setStatus("Done — " + ok + " of " + list.length + " downloaded"
        + (failed ? " · " + failed + " failed" : "")
        + (hosted ? " · links stay live for 10 minutes" : ""), ok ? "ok" : "bad");

      // Combining pulls every archive back into memory, so only offer it when
      // the total is small enough to survive it.
      const MAX_COMBINE = 200 * 1024 * 1024;
      const totalBytes = collected.reduce((n, c) => n + (c.size || 0), 0);
      if (collected.length > 1 && window.fflate && totalBytes < MAX_COMBINE) {
        zipAllBtn.hidden = false;
        const label = "Download all " + collected.length + " as one ZIP";
        zipAllBtn.textContent = label;
        zipAllBtn.onclick = async () => {
          zipAllBtn.disabled = true;
          zipAllBtn.textContent = "Building combined ZIP…";
          try {
            const files = {}; const used = Object.create(null);
            for (const c of collected) {
              let bytes = c.bytes;
              if (!bytes && c.path) {
                const r = await fetch(BACKEND_URL + c.path, { cache: "no-store" });
                if (!r.ok) throw new Error("expired");
                bytes = new Uint8Array(await r.arrayBuffer());
              }
              let n = c.name, k = 1;
              while (used[n]) { k++; n = c.name.replace(/\.zip$/, "") + " (" + k + ").zip"; }
              used[n] = 1; files[n] = bytes;
            }
            saveBytes(window.fflate.zipSync(files, { level: 0 }),
                      "propertyfinder-batch-" + collected.length + ".zip");
          } catch (e) {
            setStatus("Couldn't build the combined ZIP — use the per-row Download buttons.", "bad");
          } finally {
            zipAllBtn.disabled = false; zipAllBtn.textContent = label;
          }
        };
      }
    }

    /* ------------------------------ mode ------------------------------ */
    function setMode(next) {
      if (busy) return;
      mode = next;
      const single = mode === "single";
      segSingle.setAttribute("aria-selected", String(single));
      segBatch.setAttribute("aria-selected", String(!single));
      paneSingle.hidden = !single;
      paneBatch.hidden = single;
      goLabel.textContent = single ? "Download photos" : "Process links";
      resultsEl.hidden = true; zipAllBtn.hidden = true; setStatus("", "");
      (single ? urlInput : urlsInput).focus({ preventScroll: true });
    }

    segSingle.addEventListener("click", () => setMode("single"));
    segBatch.addEventListener("click", () => setMode("batch"));
    goBtn.addEventListener("click", () => { if (!busy) (mode === "single" ? runSingle() : runBatch()); });
    urlInput.addEventListener("keydown", (e) => { if (e.key === "Enter" && !busy) runSingle(); });
    urlsInput.addEventListener("input", updateCounter);
    pasteBtn.addEventListener("click", async () => {
      try { const t = await navigator.clipboard.readText(); if (t) urlInput.value = t.trim(); } catch (e) {}
      urlInput.focus();
    });
    window.addEventListener("beforeunload", (e) => { if (busy) { e.preventDefault(); e.returnValue = ""; } });

    /* ------------------------- server status chip ------------------------- */
    const serverEl = $("server"), serverText = $("serverText");
    function setServer(state, text) { serverEl.className = "server " + state; serverText.textContent = text; }
    let lastPing = 0;
    async function pingServer() {
      const now = Date.now();
      if (now - lastPing < 120000) return;
      lastPing = now;
      setServer("check", "Checking server…");
      const waking = setTimeout(() => setServer("waking", "Waking the server…"), 3500);
      try {
        const r = await fetch(BACKEND_URL + "/", { method: "GET", cache: "no-store" });
        clearTimeout(waking);
        if (r.ok) {
          let v = "";
          try { const d = await r.json(); if (d && d.version) v = " · v" + d.version; } catch (e) {}
          setServer("on", "Server ready" + v);
        } else setServer("off", "Server error");
      } catch (e) { clearTimeout(waking); setServer("off", "Server unreachable"); }
    }
    pingServer();
    window.addEventListener("focus", pingServer);
    urlInput.addEventListener("focus", pingServer);
    urlsInput.addEventListener("focus", pingServer);

    /* ------------------------- motion layer ------------------------- */
    (function () {
      const fine = window.matchMedia("(pointer: fine)").matches;
      const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (!fine || reduce) return;

      document.body.classList.add("custom-cursor");
      const dot = document.querySelector(".cursor-dot");
      const ring = document.querySelector(".cursor-ring");
      const card = $("card");
      const stage = document.querySelector(".stage");
      const blobs = Array.from(document.querySelectorAll(".blob"));

      let mx = innerWidth / 2, my = innerHeight / 2, rx = mx, ry = my;

      addEventListener("mousemove", (e) => {
        mx = e.clientX; my = e.clientY;
        dot.style.transform = "translate(" + mx + "px," + my + "px) translate(-50%,-50%)";
      }, { passive: true });

      (function loop() {
        rx += (mx - rx) * 0.18; ry += (my - ry) * 0.18;
        ring.style.transform = "translate(" + rx + "px," + ry + "px) translate(-50%,-50%)";
        const nx = mx / innerWidth - 0.5, ny = my / innerHeight - 0.5;
        for (const b of blobs) {
          const d = parseFloat(b.dataset.depth) || 0;
          b.style.transform = "translate3d(" + nx * d + "px," + ny * d + "px,0)";
        }
        requestAnimationFrame(loop);
      })();

      document.querySelectorAll("[data-cursor]").forEach((el) => {
        el.addEventListener("mouseenter", () => ring.classList.add("hot"));
        el.addEventListener("mouseleave", () => ring.classList.remove("hot"));
      });

      // 3D tilt — suppressed while typing or hovering a control, so the card never
      // shifts under the caret.
      const typing = () => {
        const a = document.activeElement;
        return a && (a.tagName === "INPUT" || a.tagName === "TEXTAREA");
      };
      stage.addEventListener("mousemove", (e) => {
        if (typing() || (e.target.closest && e.target.closest("input, textarea, button, a"))) {
          card.classList.remove("lift"); card.style.transform = ""; return;
        }
        const r = card.getBoundingClientRect();
        const px = (e.clientX - r.left) / r.width, py = (e.clientY - r.top) / r.height;
        card.classList.add("lift");
        card.style.transform = "rotateX(" + (0.5 - py) * 6 + "deg) rotateY(" + (px - 0.5) * 6 + "deg)";
        card.style.setProperty("--sx", px * 100 + "%");
        card.style.setProperty("--sy", py * 100 + "%");
      });
      stage.addEventListener("mouseleave", () => { card.classList.remove("lift"); card.style.transform = ""; });

      // CTA: coral fill reveals from the cursor (no button movement)
      goBtn.addEventListener("mousemove", (e) => {
        const r = goBtn.getBoundingClientRect();
        goBtn.style.setProperty("--cx", ((e.clientX - r.left) / r.width * 100) + "%");
        goBtn.style.setProperty("--cy", ((e.clientY - r.top) / r.height * 100) + "%");
      });
    })();
  </script>
</body>
</html>
